services:
  postgres:
    image: postgres:15-alpine
    container_name: shubha_yatra_db
    environment:
      POSTGRES_DB: shubha_yatra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
